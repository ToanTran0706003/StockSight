services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: stocksight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - stocksight-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      - postgres
      - redis
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=stocksight;Username=postgres;Password=postgres
      Redis__ConnectionString: redis:6379
      Cors__AllowedOrigins__0: http://localhost:8081
      Jwt__Secret: stocksight-docker-dev-secret-key-change-me
      OpenAI__ApiKey: ""
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - api
    ports:
      - "8081:80"

volumes:
  stocksight-postgres:
